# the base hostname & protocol for your site, e.g. http://example.com
url:     "https://map.coderdojo.jp"
baseurl: "/" # the subpath of your site, e.g. /blog

# 地図マーカーの描画方式（upsert_dojos_geojson.rb が参照）
#   default   : circle マーカー（Geolonia スプライト非依存。障害に強く推奨）
#   coderdojo : CoderDojo ロゴ（marker-symbol。Geolonia スプライト サーバ依存）
marker: default

# Build settings
plugins:
  - jekyll-sitemap # This must be LAST to include contents generated by gems above

exclude:
  - README.md
  - LICENSE.md
  - CODE_OF_CONDUCT.md
  - dojo2dojo.csv

