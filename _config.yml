# the base hostname & protocol for your site, e.g. http://example.com
url:     "https://map.coderdojo.jp"
baseurl: "/" # the subpath of your site, e.g. /blog

# 地図マーカーの描画方式（upsert_dojos_geojson.rb が参照）
#   default   : circle マーカー（Geolonia スプライト非依存。障害に強く推奨）
#   coderdojo : CoderDojo ロゴ（marker-symbol。Geolonia スプライト サーバ依存）
marker: coderdojo

# Geolonia Maps の埋め込みスクリプト URL（_includes/geolonia_embed.html が参照）
#
# バージョンを上げる時はここだけ変更すればよい。全ページに反映される。
# バージョンごとに URL 構造が異なるため、バージョン番号だけでなくパスを含めて指定する:
#   v1: https://cdn.geolonia.com/v1/embed        （旧インフラ。/embed/v1/embed は 403）
#   v5: https://cdn.geolonia.com/embed/v5/embed  （現行。/v5/embed は 403）
#
# 経緯: 2026年7月に v1 が参照する旧インフラで障害が発生し、世界地図が表示されなくなった。
#       https://github.com/geolonia/docs.geolonia.com/issues/125
geolonia_embed_url: https://cdn.geolonia.com/embed/v5/embed

# Build settings
plugins:
  - jekyll-sitemap # This must be LAST to include contents generated by gems above

exclude:
  - README.md
  - LICENSE.md
  - CODE_OF_CONDUCT.md
  - dojo2dojo.csv

